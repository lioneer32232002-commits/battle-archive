<body>
  <!-- 戰損濾鏡:以 SVG 亂流位移讓標題邊緣產生風化、侵蝕的戰損感 -->
  <svg class="svg-defs" aria-hidden="true" focusable="false" width="0" height="0">
    <defs>
      <filter id="battle-worn" x="-8%" y="-8%" width="116%" height="116%">
        <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="9" result="n" />
        <feDisplacementMap in="SourceGraphic" in2="n" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
      </filter>
      <filter id="battle-worn-hero" x="-12%" y="-12%" width="124%" height="124%">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.022" numOctaves="3" seed="5" result="n" />
        <feDisplacementMap in="SourceGraphic" in2="n" scale="3.4" xChannelSelector="R" yChannelSelector="G" />
      </filter>
      <!-- 弱化版:給小字(戰役選項、英文)用,保留可讀性 -->
      <filter id="battle-worn-soft" x="-6%" y="-6%" width="112%" height="112%">
        <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" seed="13" result="n" />
        <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>
  <header class="site-header">
    <div class="hero">
      <img class="hero-img" src="/banner-home.jpg" alt="" loading="eager" decoding="async" />
      <div class="hero-scrim"></div>
      <div class="hero-content">
        <h1>戰史檔案館</h1>
        <p class="tagline">
          <span>以 3D 運鏡重返烽火現場</span>
          <span>親臨扭轉世界命運的關鍵決戰</span>
        </p>
      </div>
    </div>
  </header>
  <main id="app"></main>
